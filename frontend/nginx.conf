server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sin esto, nginx usa su default de 1MB y corta en seco cualquier
    # multipart con archivos adjuntos (carnet, papeles, permiso de
    # circulación, documentos de mascota) antes de llegar al backend, con un
    # 413 en HTML (sin JSON) que el frontend no puede interpretar y termina
    # mostrando "No se pudo conectar con el servidor". Empareja el límite del
    # connector de Tomcat (server.tomcat.max-http-form-post-size: 20MB).
    client_max_body_size 20m;

    # SPA: toda ruta desconocida vuelve a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de la API hacia el backend (mismo nombre de servicio en docker-compose)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

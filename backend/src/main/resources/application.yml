spring:
  application:
    name: sffe-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sffe?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago}
    username: ${SPRING_DATASOURCE_USERNAME:sffe}
    password: ${SPRING_DATASOURCE_PASSWORD:sffe_dev_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB
  # RF05: notificación por correo al aprobar/rechazar un ingreso. En desarrollo
  # apunta al contenedor mailpit del docker-compose (sin autenticación).
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS:false}
          # Evita que un SMTP caído/no configurado deje colgada la resolución
          # de fiscalización (el envío corre síncrono dentro de la transacción).
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080
  tomcat:
    # Límite del connector de Tomcat para el body de requests POST (multipart
    # incluido). Por defecto son solo 2MB, muy por debajo de
    # spring.servlet.multipart.max-request-size (15MB): sin esto, subir un
    # menor con 3 archivos adjuntos se corta antes de llegar a la validación
    # de la aplicación.
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB

# RNF07: auto-documentación de endpoints con OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# RNF06: endpoints de salud para monitoreo de disponibilidad
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

sffe:
  jwt:
    secret: ${SFFE_JWT_SECRET:secreto-solo-para-desarrollo-local-no-usar-en-produccion}
    expiration-ms: ${SFFE_JWT_EXPIRATION_MS:86400000}
  upload:
    # Carnet de identidad, papeles de antecedentes, permiso notarial, permiso
    # de circulación y documentos de mascotas (RF01, RF02, RF03).
    dir: ${SFFE_UPLOAD_DIR:uploads}
  mail:
    from: ${SFFE_MAIL_FROM:no-reply@sffe.cl}
  frontend:
    # Base para los enlaces de verificación de correo y recuperación de
    # contraseña que se envían por email (debe ser resoluble por el navegador
    # del pasajero, no una URL interna del contenedor).
    url: ${SFFE_FRONTEND_URL:http://localhost:5173}
  monitoreo:
    # Cantidad de códigos QR ACTIVOS (pasajeros en cola) equivalente al 100%
    # de ocupación del paso fronterizo (RF10). No hay un valor oficial real
    # para Los Libertadores en este prototipo; es un umbral configurable.
    capacidad-maxima: ${SFFE_MONITOREO_CAPACIDAD_MAXIMA:50}

logging:
  level:
    cl.duoc.sffe: DEBUG
